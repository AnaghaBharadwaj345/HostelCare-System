<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HOSTELCARE</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= AUTH BOX ================= -->
<div id="loginBox" class="box">
  <h2>HOSTELCARE</h2>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <h3>LOGIN</h3>

    <select id="role">
      <option value="student">Student</option>
      <option value="warden">Warden</option>
      <option value="technician">Technician</option>
    </select>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    
    <p style="text-align: center; margin-top: 10px;">
      <button id="signupToggle" onclick="toggleAuthMode()" style="background: none; border: none; color: #007bff; cursor: pointer; text-decoration: underline;">
        Don't have an account? Sign up
      </button>
    </p>
  </div>

  <!-- SIGNUP FORM (STUDENT ONLY) -->
  <div id="signupForm" class="hidden">
    <h3>STUDENT SIGN UP</h3>

    <input id="signupStudentId" placeholder="Student ID (e.g., 1MS22CS001)">
    <input id="signupName" placeholder="Full Name">
    <input id="signupPassword" type="password" placeholder="Password">
    <input id="signupConfirmPassword" type="password" placeholder="Confirm Password">

    <button onclick="signupStudent()">Sign Up</button>
    
    <p style="text-align: center; margin-top: 10px;">
      <button id="loginToggle" onclick="toggleAuthMode()" style="background: none; border: none; color: #007bff; cursor: pointer; text-decoration: underline;">
        Already have an account? Login
      </button>
    </p>
  </div>
</div>

<!-- ================= STUDENT DASHBOARD ================= -->
<div id="studentDash" class="hidden">

  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Student Dashboard</h2>
    <button onclick="logout()" style="padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Logout</button>
  </div>

  <input id="title" placeholder="Complaint Title">
  <input id="desc" placeholder="Description">
  <input id="category" placeholder="Category (plumbing/food/electrical/general/cleaning)">
  <input id="location" placeholder="Location">

  <label>
    <input type="checkbox" id="anonymous"> Anonymous
  </label>

  <label>
    <input type="checkbox" id="urgent"> Urgent 🔥
  </label>

  <button onclick="submitComplaint()">Submit Complaint</button>

  <h3>My Complaints</h3>
  <div id="studentComplaints"></div>

  <h3>Notifications</h3>
  <div id="studentNotifications"></div>
</div>

<!-- ================= WARDEN DASHBOARD ================= -->
<div id="wardenDash" class="hidden">

  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Warden Dashboard</h2>
    <button onclick="logout()" style="padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Logout</button>
  </div>

  <h3>Complaints</h3>
  <div id="wardenComplaints"></div>

  <h3>Analytics</h3>
  <div id="analyticsBox"></div>
</div>

<!-- ================= TECHNICIAN DASHBOARD ================= -->
<div id="techDash" class="hidden">

  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Technician Dashboard</h2>
    <button onclick="logout()" style="padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Logout</button>
  </div>

  <div id="techComplaints"></div>

  <h3>Notifications</h3>
  <div id="techNotifications"></div>
</div>

<script src="app.js"></script>

</body>
</html>
